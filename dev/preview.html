<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CleanTabs Preview</title>
    <link rel="stylesheet" href="../popup.css">
    <style>
      body {
        min-height: 100vh;
        display: grid;
        place-items: start center;
        gap: 14px;
        width: auto;
        min-width: 0;
        max-height: none;
        padding: 32px;
      }

      .preview-controls {
        width: 800px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 8px;
        color: #526174;
        font: 13px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .preview-controls select {
        min-height: 32px;
        border: 1px solid #dbe1e8;
        border-radius: 6px;
        padding: 4px 8px;
        background: #ffffff;
        color: #1f2933;
        font: inherit;
      }

      .preview-shell {
        box-shadow: 0 18px 45px rgb(31 41 51 / 16%);
      }
    </style>
  </head>
  <body>
    <label class="preview-controls">
      <span>Preview language</span>
      <select id="previewLocale"></select>
    </label>

    <main class="app preview-shell">
      <header class="topbar">
        <div>
          <h1 id="appTitle">CleanTabs</h1>
          <p id="summary">Loading tabs...</p>
        </div>
        <button id="refreshButton" class="refresh-button" type="button">Refresh</button>
      </header>

      <section class="filters" aria-label="Tab filters">
        <label class="field">
          <span id="metadataSearchLabel">URL or title</span>
          <input id="metadataSearch" type="search" autocomplete="off" placeholder="Search URL or title">
        </label>
        <label class="field">
          <span id="contentSearchLabel">Page text</span>
          <div class="search-row">
            <input id="contentSearch" type="search" autocomplete="off" placeholder="Search loaded page text">
            <button id="contentSearchButton" type="button">Search</button>
          </div>
        </label>
        <div class="toolbar">
          <label class="toggle">
            <input id="newTabsOnly" type="checkbox">
            <span id="newTabsLabel">New tabs</span>
          </label>
          <button id="clearFiltersButton" type="button">Clear</button>
        </div>
      </section>

      <section id="contentStatus" class="status" hidden></section>
      <section id="resultsActions" class="results-actions" hidden>
        <span id="resultsMeta"></span>
        <div class="results-buttons">
          <button id="selectVisibleButton" type="button">Select results</button>
          <button id="clearSelectionButton" type="button">Clear selection</button>
          <button id="closeVisibleButton" class="danger" type="button">Close results</button>
        </div>
      </section>
      <section id="groups" class="groups" aria-live="polite"></section>
      <section id="emptyState" class="empty" hidden>No matching tabs.</section>
    </main>

    <script src="preview.js"></script>
    <script src="../popup.js"></script>
  </body>
</html>
